<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nikkah Invitation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Allura&family=Playfair+Display:wght@500;600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: url('background2.jpg') no-repeat center center;
      background-size: cover;
      min-height: 100vh;
      overflow: hidden;
    }

    .overlay {
      min-height: 100vh;
      background: rgba(80, 20, 30, 0.25);
      backdrop-filter: blur(3px);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .main-design {
      position: relative;
      width: 570px;
      max-width: 98vw;
    }

    /* BASE FLOWER */
    .backflower {
      position: absolute;
      opacity: 0;
      z-index: 1;
      animation-fill-mode: forwards;
      animation-timing-function: ease-out;
    }

    /* 🌸 LAYER 1 (CENTER) */
    .flower-layer-1 {
      top: 50%;
      width: 150px;
      animation: bloom1 2s ease-out forwards;
      animation-delay: 0.5s;
    }

    /* 🌸 LAYER 2 (LOWER) */
    .flower-layer-2 {
      top: 68%; /* LOWER */
      width: 180px;
      animation: bloom2 2.2s ease-out forwards;
      animation-delay: 1.5s;
    }

    /* 🌸 LAYER 3 (BOTTOM) */
    .flower-layer-3 {
      top: 88%; /* MOST DOWN */
      width: 210px;
      animation: bloom3 2.4s ease-out forwards;
      animation-delay: 2.5s;
    }

    /* LEFT / RIGHT */
    .left { left: 50%; transform: translate(-50%, -50%) scale(0.3); }
    .right { right: 50%; transform: translate(50%, -50%) scale(0.3) scaleX(-1); }

    /* ANIMATIONS */

    @keyframes bloom1 {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
      100% { left: 40px; opacity: 1; transform: translate(0, -50%) scale(1); }
    }

    @keyframes bloom2 {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
      100% { left: -20px; opacity: 1; transform: translate(0, -50%) scale(1); }
    }

    @keyframes bloom3 {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
      100% { left: -90px; opacity: 1; transform: translate(0, -50%) scale(1); }
    }

    @keyframes bloom1R {
      0% { opacity: 0; transform: translate(50%, -50%) scale(0.3) scaleX(-1); }
      100% { right: 40px; opacity: 1; transform: translate(0, -50%) scale(1) scaleX(-1); }
    }

    @keyframes bloom2R {
      0% { opacity: 0; transform: translate(50%, -50%) scale(0.3) scaleX(-1); }
      100% { right: -20px; opacity: 1; transform: translate(0, -50%) scale(1) scaleX(-1); }
    }

    @keyframes bloom3R {
      0% { opacity: 0; transform: translate(50%, -50%) scale(0.3) scaleX(-1); }
      100% { right: -90px; opacity: 1; transform: translate(0, -50%) scale(1) scaleX(-1); }
    }

    .flower-layer-1.right { animation-name: bloom1R; }
    .flower-layer-2.right { animation-name: bloom2R; }
    .flower-layer-3.right { animation-name: bloom3R; }

    /* CARD */
    .card-container {
      position: relative;
      width: 500px;
      margin: auto;
      z-index: 5;
      animation: floatCard 4s ease-in-out infinite;
    }

    .card-img {
      width: 100%;
      filter: drop-shadow(0 30px 35px rgba(0,0,0,0.4));
    }

    .text {
      position: absolute;
      top: 13%;
      left: 12%;
      width: 76%;
      height: 74%;
      color: white;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      text-transform: uppercase;
    }

    .names {
      font-family: 'Allura', cursive;
      font-size: 30px;
      margin-bottom: 15px;
    }

    .btn {
      margin-top: 8px;
      padding: 2px 4px;
      border: 1px solid white;
      background: transparent;
      color: white;
      font-size: 11px;
      text-decoration: none;
    }

    @keyframes floatCard {
      0% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0); }
    }
  </style>
</head>

<body>

<div class="overlay">

  <div class="main-design">

    <!-- 🌸 LAYERS -->
    <img src="backflower.png" class="backflower flower-layer-1 left">
    <img src="backflower.png" class="backflower flower-layer-1 right">

    <img src="backflower2.png" class="backflower flower-layer-2 left">
    <img src="backflower2.png" class="backflower flower-layer-2 right">

    <img src="backflower3.png" class="backflower flower-layer-3 left">
    <img src="backflower3.png" class="backflower flower-layer-3 right">

    <!-- CARD -->
    <div class="card-container">

      <img src="card.png" class="card-img">

      <div class="text">
        <h1>NIKKAH<br>INVITATION</h1>

        <div class="names">
          Aisha Semran<br>&<br>Mohammad Fouji
        </div>

        <a class="btn"
           href="https://www.google.com/maps/search/?api=1&query=Le+Cafe+de+l%27Horloge+Rigaud"
           target="_blank">
          View Location
        </a>
      </div>

    </div>

  </div>

</div>

</body>
</html>
