<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nikkah Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Allura&family=Playfair+Display:wght@500&family=Poppins&display=swap" rel="stylesheet">

<style>

body {
  margin:0;
  font-family:'Poppins', sans-serif;
  background:url('background2.jpg') center/cover no-repeat;
  height:100vh;
  overflow:hidden;
}

.overlay {
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* MAIN SCALE */
.main-design {
  position:relative;
  width:min(600px, 92vw);
}

/* CARD */
.card-container {
  position:relative;
  width:100%;
  animation: float 4s ease-in-out infinite;
  z-index:5;
}

.card-img {
  width:100%;
}

/* TEXT */
.text {
  position:absolute;
  top:13%;
  left:12%;
  width:76%;
  height:74%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
  text-align:center;
}

/* RESPONSIVE TEXT */
h1 {
  font-family:'Playfair Display';
  font-size:clamp(18px,4vw,26px);
}

.names {
  font-family:'Allura';
  font-size:clamp(20px,5vw,30px);
}

.message {
  font-size:clamp(10px,3vw,13px);
  margin:10px 0;
}

.details {
  font-size:clamp(10px,3vw,13px);
}

/* COUNTDOWN */
.countdown {
  display:flex;
  gap:5px;
}

.time-box {
  background:rgba(255,255,255,0.2);
  padding:4px 6px;
  border-radius:6px;
  font-size:clamp(10px,3vw,12px);
}

/* BUTTON */
.btn {
  margin-top:10px;
  padding:3px 8px;
  border:1px solid white;
  color:white;
  font-size:clamp(10px,3vw,11px);
  text-decoration:none;
}

/* FLOAT */
@keyframes float {
  50% { transform:translateY(-8px); }
}

/* 🌸 REAL FALLING FLOWERS */
.falling-flowers {
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:1;
}

.falling-flowers img {
  position:absolute;
  top:-50px;
  width:clamp(20px,5vw,35px);
  opacity:0.8;
  animation:fall linear infinite;
}

.falling-flowers img:nth-child(1){ left:10%; animation-duration:10s;}
.falling-flowers img:nth-child(2){ left:30%; animation-duration:12s;}
.falling-flowers img:nth-child(3){ left:50%; animation-duration:11s;}
.falling-flowers img:nth-child(4){ left:70%; animation-duration:13s;}
.falling-flowers img:nth-child(5){ left:90%; animation-duration:14s;}

@keyframes fall {
  0% { transform:translateY(-60px) rotate(0deg); opacity:0;}
  10% { opacity:1;}
  100% { transform:translateY(110vh) rotate(360deg); opacity:0;}
}

</style>
</head>

<body>

<div class="overlay">

<!-- 🌸 REAL FLOWERS -->
<div class="falling-flowers">
  <img src="backflower.png">
  <img src="backflower2.png">
  <img src="backflower.png">
  <img src="backflower2.png">
  <img src="backflower.png">
</div>

<div class="main-design">

<div class="card-container">

<img src="card.png" class="card-img">

<div class="text">

<h1>NIKKAH<br>INVITATION</h1>

<div class="names">
Aisha Semran<br>&<br>Mohammad Fouji
</div>

<div class="message">
You are warmly invited to our Nikkah ceremony
</div>

<div class="countdown">
<div class="time-box"><span id="d">00</span>d</div>
<div class="time-box"><span id="h">00</span>h</div>
<div class="time-box"><span id="m">00</span>m</div>
<div class="time-box"><span id="s">00</span>s</div>
</div>

<div class="details">
📅 May 22, 2026<br>
⏰ 4:00 PM<br>
📍 Rigaud
</div>

<a class="btn" href="https://maps.google.com" target="_blank">
View Location
</a>

</div>
</div>
</div>
</div>

<script>
const date = new Date("May 22, 2026 16:00:00").getTime();

setInterval(()=>{
let now = new Date().getTime();
let diff = date - now;

document.getElementById("d").innerHTML = Math.floor(diff/(1000*60*60*24));
document.getElementById("h").innerHTML = Math.floor((diff/(1000*60*60))%24);
document.getElementById("m").innerHTML = Math.floor((diff/(1000*60))%60);
document.getElementById("s").innerHTML = Math.floor((diff/1000)%60);
},1000);
</script>

</body>
</html>
