<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nikkah Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Allura&family=Playfair+Display:wght@500&family=Poppins&display=swap" rel="stylesheet">

<style>

body {
  margin:0;
  font-family:'Poppins', sans-serif;
  background:url('background2.jpg') center/cover no-repeat;
  height:100vh;
  overflow:hidden;
}

.overlay {
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* MAIN */
.main-design {
  position:relative;
  width:min(520px, 90vw);
}

/* CARD */
.card-container {
  position:relative;
  width:100%;
  z-index:5;
  animation: float 4s ease-in-out infinite;
}

.card-img {
  width:100%;
}

@keyframes float {
  50% { transform:translateY(-6px); }
}

/* TEXT */
.text {
  position:absolute;
  top:14%;
  left:12%;
  width:76%;
  height:72%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
  text-align:center;
}

h1 {
  font-family:'Playfair Display';
  font-size:clamp(16px,3.5vw,22px);
}

.names {
  font-family:'Allura';
  font-size:clamp(18px,4.5vw,26px);
}

.message {
  font-size:clamp(9px,2.8vw,12px);
  margin:8px 0;
}

.details {
  font-size:clamp(9px,2.8vw,12px);
}

.countdown {
  display:flex;
  gap:4px;
}

.time-box {
  background:rgba(255,255,255,0.2);
  padding:3px 5px;
  border-radius:6px;
  font-size:clamp(9px,2.5vw,11px);
}

.btn {
  margin-top:8px;
  padding:2px 6px;
  border:1px solid white;
  color:white;
  font-size:clamp(9px,2.5vw,10px);
  text-decoration:none;
}

/* 🌸 BLOOM FLOWERS */
.bloom {
  position:absolute;
  opacity:0;
  z-index:1;
  animation-fill-mode:forwards;
}

/* layers */
.flower1 { top:28%; width:130px; animation:bloom1 2s forwards 0.5s;}
.flower2 { top:42%; width:160px; animation:bloom2 2s forwards 1.2s;}
.flower3 { top:58%; width:200px; animation:bloom3 2s forwards 2s;}
.flower4 { top:72%; width:160px; animation:bloom4 2s forwards 2.8s;}
.flower5 { top:85%; width:130px; animation:bloom5 2s forwards 3.6s;}
.flower6 { top:90%; width:110px; animation:bloom6 2s forwards 4.3s;}

.flower7 {
  top:92%;
  left:50%;
  width:140px;
  transform:translate(-50%,-50%) scale(0.2);
  animation:bloomCenter 2s forwards 5s;
}

/* start positions */
.left { left:50%; transform:translate(-50%,-50%) scale(0.2);}
.right { right:50%; transform:translate(50%,-50%) scale(0.2) scaleX(-1);}

/* FINAL POSITIONS (FIXED — pushed OUT) */
@keyframes bloom1 { to { left:90px; opacity:1; transform:translate(0,-50%) scale(1);} }
@keyframes bloom2 { to { left:30px; opacity:1; transform:translate(0,-50%) scale(1);} }
@keyframes bloom3 { to { left:-90px; opacity:1; transform:translate(0,-50%) scale(1);} }
@keyframes bloom4 { to { left:30px; opacity:1; transform:translate(0,-50%) scale(1);} }
@keyframes bloom5 { to { left:90px; opacity:1; transform:translate(0,-50%) scale(1);} }
@keyframes bloom6 { to { left:150px; opacity:1; transform:translate(0,-50%) scale(1);} }

@keyframes bloomCenter {
  to { opacity:1; transform:translate(-50%,-50%) scale(1); }
}

/* mirror */
.right.flower1 { animation-name:bloom1R;}
.right.flower2 { animation-name:bloom2R;}
.right.flower3 { animation-name:bloom3R;}
.right.flower4 { animation-name:bloom4R;}
.right.flower5 { animation-name:bloom5R;}
.right.flower6 { animation-name:bloom6R;}

@keyframes bloom1R { to { right:90px; opacity:1; transform:translate(0,-50%) scale(1) scaleX(-1);} }
@keyframes bloom2R { to { right:30px; opacity:1; transform:translate(0,-50%) scale(1) scaleX(-1);} }
@keyframes bloom3R { to { right:-90px; opacity:1; transform:translate(0,-50%) scale(1) scaleX(-1);} }
@keyframes bloom4R { to { right:30px; opacity:1; transform:translate(0,-50%) scale(1) scaleX(-1);} }
@keyframes bloom5R { to { right:90px; opacity:1; transform:translate(0,-50%) scale(1) scaleX(-1);} }
@keyframes bloom6R { to { right:150px; opacity:1; transform:translate(0,-50%) scale(1) scaleX(-1);} }

/* 🌸 FALLING FLOWERS */
.falling-flowers {
  position:fixed;
  inset:0;
  pointer-events:none;
}

.falling-flowers img {
  position:absolute;
  top:-50px;
  width:25px;
  opacity:0.8;
  animation:fall linear infinite;
}

.falling-flowers img:nth-child(1){ left:10%; animation-duration:10s;}
.falling-flowers img:nth-child(2){ left:30%; animation-duration:12s;}
.falling-flowers img:nth-child(3){ left:50%; animation-duration:11s;}
.falling-flowers img:nth-child(4){ left:70%; animation-duration:13s;}
.falling-flowers img:nth-child(5){ left:90%; animation-duration:14s;}

@keyframes fall {
  0% { transform:translateY(-60px) rotate(0deg); opacity:0;}
  10% { opacity:1;}
  100% { transform:translateY(110vh) rotate(360deg); opacity:0;}
}

</style>
</head>

<body>

<div class="overlay">

<div class="falling-flowers">
  <img src="backflower.png">
  <img src="backflower2.png">
  <img src="backflower.png">
  <img src="backflower2.png">
  <img src="backflower.png">
</div>

<div class="main-design">

<!-- BLOOM FLOWERS -->
<img src="backflower.png" class="bloom flower1 left">
<img src="backflower.png" class="bloom flower1 right">

<img src="backflower2.png" class="bloom flower2 left">
<img src="backflower2.png" class="bloom flower2 right">

<img src="backflower3.png" class="bloom flower3 left">
<img src="backflower3.png" class="bloom flower3 right">

<img src="backflower4.png" class="bloom flower4 left">
<img src="backflower4.png" class="bloom flower4 right">

<img src="backflower5.png" class="bloom flower5 left">
<img src="backflower5.png" class="bloom flower5 right">

<img src="backflower6.png" class="bloom flower6 left">
<img src="backflower6.png" class="bloom flower6 right">

<img src="backflower7.png" class="bloom flower7">

<!-- CARD -->
<div class="card-container">

<img src="card.png" class="card-img">

<div class="text">

<h1>NIKKAH<br>INVITATION</h1>

<div class="names">
Aisha Semran<br>&<br>Mohammad Fouji
</div>

<div class="message">
You are warmly invited to our Nikkah ceremony
</div>

<div class="countdown">
<div class="time-box"><span id="d">00</span>d</div>
<div class="time-box"><span id="h">00</span>h</div>
<div class="time-box"><span id="m">00</span>m</div>
<div class="time-box"><span id="s">00</span>s</div>
</div>

<div class="details">
📅 Friday, May 22, 2026<br>
⏰ 4:00 PM<br>
📍 Rigaud
</div>

<a class="btn" href="https://maps.google.com" target="_blank">
View Location
</a>

</div>
</div>
</div>
</div>

<script>
const date = new Date("May 22, 2026 16:00:00").getTime();

setInterval(()=>{
let now = new Date().getTime();
let diff = date - now;

document.getElementById("d").innerHTML = Math.floor(diff/(1000*60*60*24));
document.getElementById("h").innerHTML = Math.floor((diff/(1000*60*60))%24);
document.getElementById("m").innerHTML = Math.floor((diff/(1000*60))%60);
document.getElementById("s").innerHTML = Math.floor((diff/1000)%60);
},1000);
</script>

</body>
</html>
