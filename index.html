<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nikkah Invitation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: 'Georgia', serif;
      background: #fdfaf6;
      color: #333;
      text-align: center;
      padding: 20px;
    }

    .card {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h1 {
      color: #b76e79;
      font-size: 32px;
    }

    .names {
      font-size: 26px;
      margin: 20px 0;
      font-weight: bold;
    }

    .details {
      margin: 15px 0;
      font-size: 16px;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: #b76e79;
      color: white;
      text-decoration: none;
      border-radius: 8px;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Nikkah Invitation</h1>

    <div class="names">
      Mohammad & [Bride Name]
    </div>

    <div class="details">
      You are warmly invited to our Nikkah ceremony
    </div>

    <div class="details">
      📅 Friday, May 22, 2026  
      ⏰ 4:00 PM  
    </div>

    <div class="details">
      📍 Le Café de l'Horloge, Rigaud
    </div>

    <a class="btn" href="https://maps.google.com" target="_blank">
      View Location
    </a>
  </div>

</body>
</html>
