<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nikkah Invitation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: url('background.jpg') no-repeat center center/cover;
    }

    .overlay {
      min-height: 100vh;
      background: rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-container {
      position: relative;
      width: 380px;
      max-width: 90%;
    }

    .card-img {
      width: 100%;
      display: block;
    }

    .text {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      padding: 40px 30px;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    h1 {
      font-family: 'Great Vibes', cursive;
      color: white;
      font-size: 42px;
      margin-bottom: 10px;
    }

    .names {
      font-size: 22px;
      color: white;
      font-weight: bold;
      margin: 15px 0;
    }

    .details {
      font-size: 15px;
      color: white;
      margin: 10px 0;
    }

    .btn {
      margin-top: 15px;
      padding: 10px 20px;
      background: white;
      color: #b76e79;
      text-decoration: none;
      border-radius: 20px;
      font-size: 14px;
    }

    .btn:hover {
      background: #eee;
    }
  </style>
</head>

<body>

  <div class="overlay">

    <div class="card-container">

      <!-- YOUR IMAGE -->
      <img src="card.png" class="card-img">

      <!-- TEXT ON TOP -->
      <div class="text">

        <h1>Nikkah Invitation</h1>

        <div class="names">
          Aisha Semran<br>&<br>Mohammad Fouji
        </div>

        <div class="details">
          You are warmly invited to our Nikkah ceremony
        </div>

        <div class="details">
          📅 Friday, May 22, 2026 <br>
          ⏰ 4:00 PM <br>
          📍 Le Café de l'Horloge, Rigaud
        </div>

        <a class="btn"
           href="https://www.google.com/maps/search/?api=1&query=Le+Cafe+de+l'Horloge+Rigaud"
           target="_blank">
          View Location
        </a>

      </div>

    </div>

  </div>

</body>
</html>
