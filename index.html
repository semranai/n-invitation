```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nikkah Invitation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; font-family:Arial; }

/* INTRO */
.intro {
  position:fixed;
  inset:0;
  background:black;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:999;
  cursor:pointer;
}

/* MAIN SITE */
.main-site {
  display:none;
  height:100vh;
  background:#111;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro" onclick="enterSite()">
  <h1 id="greeting"></h1>
  <h2>Tap to Enter</h2>
</div>

<!-- MAIN SITE -->
<div class="main-site" id="mainSite">
  <h1>NIKKAH INVITATION</h1>
  <h2>Aisha Semran & Mohammad Fouji</h2>
  <p>May 22, 2026</p>
</div>

<script>

/* Greeting */
const hour = new Date().getHours();
let greeting = "Welcome";

if (hour < 12) greeting = "Good Morning";
else if (hour < 18) greeting = "Good Afternoon";
else greeting = "Good Evening";

document.getElementById("greeting").innerText = greeting;

/* Enter */
function enterSite() {
  document.querySelector(".intro").style.display = "none";
  document.getElementById("mainSite").style.display = "flex";
}

</script>

</body>
</html>
