<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nikkah Invitation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: url('https://images.unsplash.com/photo-1520857014576-2c4f4c972b57') no-repeat center center/cover;
      color: #333;
      text-align: center;
    }

    .overlay {
      background: rgba(255, 255, 255, 0.85);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      max-width: 500px;
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      animation: fadeIn 1.5s ease;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      color: #b76e79;
      font-size: 36px;
      margin-bottom: 10px;
    }

    .names {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      margin: 20px 0;
      font-weight: bold;
    }

    .details {
      margin: 15px 0;
      font-size: 16px;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      background: #b76e79;
      color: white;
      text-decoration: none;
      border-radius: 25px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #9a5a63;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    footer {
      margin-top: 15px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>

<body>

  <div class="overlay">
    <div class="card">

      <h1>Nikkah Invitation</h1>

      <div class="names">
        Mohammad & [Bride Name]
      </div>

      <div class="details">
        You are warmly invited to celebrate our Nikkah ceremony
      </div>

      <div class="details">
        📅 Friday, May 22, 2026 <br>
        ⏰ 4:00 PM
      </div>

      <div class="details">
        📍 Le Café de l'Horloge, Rigaud
      </div>

      <a class="btn" 
         href="https://www.google.com/maps/search/?api=1&query=Le+Cafe+de+l'Horloge+Rigaud" 
         target="_blank">
        View Location
      </a>

      <footer>
        We look forward to celebrating with you ❤️
      </footer>

    </div>
  </div>

</body>
</html>
