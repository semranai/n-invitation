<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nikkah Invitation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: url('https://i.pinimg.com/736x/57/85/78/5785785da9cddfa53c6b7223dbdcb42e.jpg') no-repeat center center/cover;
    }

    .overlay {
      min-height: 100vh;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      max-width: 500px;
      padding: 30px;
      border-radius: 20px;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      text-align: center;
      animation: fadeUp 1.5s ease;
    }

    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 55px;
      color: #b76e79;
      margin-bottom: 10px;
    }

    .names {
      font-size: 26px;
      margin: 20px 0;
      font-weight: bold;
    }

    .details {
      margin: 15px 0;
      font-size: 16px;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      background: #b76e79;
      color: white;
      text-decoration: none;
      border-radius: 25px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #9a5a63;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <div class="overlay">
    <div class="card">

      <h1>Nikkah Invitation</h1>

      <div class="names">
        Mohammad & [Bride Name]
      </div>

      <div class="details">
        You are warmly invited to our Nikkah ceremony
      </div>

      <div class="details">
        📅 Friday, May 22, 2026 <br>
        ⏰ 4:00 PM
      </div>

      <div class="details">
        📍 Le Café de l'Horloge, Rigaud
      </div>

      <a class="btn" 
         href="https://www.google.com/maps/search/?api=1&query=Le+Cafe+de+l'Horloge+Rigaud" 
         target="_blank">
        View Location
      </a>

    </div>
  </div>

</body>
</html>
