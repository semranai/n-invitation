<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nikkah Invitation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;

      /* BACKGROUND IMAGE */
      background: url('background1.png') no-repeat center center/cover;
      min-height: 100vh;
    }

    .overlay {
      min-height: 100vh;
      background: rgba(80, 20, 30, 0.35);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 25px;
    }

    .card-container {
      position: relative;
      width: 430px;
      max-width: 95vw;
      animation: floatCard 4s ease-in-out infinite;
    }

    .card-img {
      width: 100%;
      display: block;
      filter: drop-shadow(0 35px 35px rgba(0,0,0,0.45));
    }

    .text {
      position: absolute;
      top: 14%;
      left: 12%;
      width: 76%;
      height: 72%;
      color: white;
      text-align: center;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    h1 {
      font-family: 'Great Vibes', cursive;
      font-size: 43px;
      line-height: 0.95;
      margin: 0 0 20px;
      font-weight: 400;
      text-shadow: 0 3px 8px rgba(0,0,0,0.4);
    }

    .names {
      font-size: 24px;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 22px;
      text-shadow: 0 3px 8px rgba(0,0,0,0.4);
    }

    .message {
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 20px;
      max-width: 280px;
      text-shadow: 0 3px 8px rgba(0,0,0,0.4);
    }

    .details {
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 20px;
      text-shadow: 0 3px 8px rgba(0,0,0,0.4);
    }

    .btn {
      pointer-events: auto;
      display: inline-block;
      padding: 11px 28px;
      background: white;
      color: #8b1a1a;
      text-decoration: none;
      border-radius: 30px;
      font-size: 14px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.25);
    }

    @keyframes floatCard {
      0% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
      100% { transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .card-container {
        width: 370px;
      }

      h1 {
        font-size: 35px;
        margin-bottom: 14px;
      }

      .names {
        font-size: 20px;
        margin-bottom: 16px;
      }

      .message,
      .details {
        font-size: 12px;
      }

      .btn {
        padding: 10px 22px;
        font-size: 13px;
      }
    }
  </style>
</head>

<body>

  <div class="overlay">

    <div class="card-container">

      <img src="card.png" class="card-img" alt="Invitation Card">

      <div class="text">

        <h1>Nikkah<br>Invitation</h1>

        <div class="names">
          Aisha Semran<br>
          &<br>
          Mohammad Fouji
        </div>

        <div class="message">
          You are warmly invited to our Nikkah ceremony
        </div>

        <div class="details">
          📅 Friday, May 22, 2026<br>
          ⏰ 4:00 PM<br>
          📍 Le Café de l'Horloge, Rigaud
        </div>

        <a class="btn"
           href="https://www.google.com/maps/search/?api=1&query=Le+Cafe+de+l'Horloge+Rigaud"
           target="_blank">
          View Location
        </a>

      </div>

    </div>

  </div>

</body>
</html>
